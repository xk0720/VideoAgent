# Editing heuristic presets. Selected by DirectorAgent (see prompts/director_heuristic.txt).
# Each preset overrides the metric weights used by tools.retrieval_tool::RetrievalTool._score.
# Reference: DIRECT paper §4.2 "Action Pacing & Aesthetic Adaptation".

presets:
  # Strong prompt grounding; ignores motion/framing continuity. Use for
  # narrative-driven sections (verse with lyric content).
  semantic_priority:
    weights: { m1: 0.50, m2: 0.30, m3: 0.05, m4: 0.05, m5: 0.05, m6: 0.05 }

  # Maximizes optical-flow continuity across cuts. Good for chase/action.
  motion_continuity:
    weights: { m1: 0.10, m2: 0.10, m3: 0.40, m4: 0.10, m5: 0.15, m6: 0.15 }

  # Saliency-aligned framing across cuts (Wasserstein between saliency maps).
  framing_consistency:
    weights: { m1: 0.10, m2: 0.10, m3: 0.15, m4: 0.40, m5: 0.15, m6: 0.10 }

  # Balanced visual-coherence preset. The default if Director is uncertain.
  hybrid_visual_coherent:
    weights: { m1: 0.10, m2: 0.10, m3: 0.25, m4: 0.25, m5: 0.15, m6: 0.15 }

  # Beat-synced cuts dominate (chorus / drop).
  rhythm_first:
    weights: { m1: 0.10, m2: 0.10, m3: 0.10, m4: 0.10, m5: 0.40, m6: 0.20 }

  # Match flow magnitude to music RMS energy.
  energy_alignment:
    weights: { m1: 0.10, m2: 0.10, m3: 0.10, m4: 0.10, m5: 0.20, m6: 0.40 }

  default:
    weights: { m1: 0.20, m2: 0.15, m3: 0.20, m4: 0.15, m5: 0.15, m6: 0.15 }

# Metric documentation (kept here so DirectorAgent can read it as part of the prompt context):
metric_descriptions:
  m1: "prompt relevance — cosine(CLIP(shot), CLIP(prompt))"
  m2: "segment consistency — cosine(CLIP(prev_shot), CLIP(curr_shot))"
  m3: "motion continuity — flow-magnitude × flow-direction similarity at the cut boundary"
  m4: "framing — 1 - Wasserstein(saliency_prev_end, saliency_curr_start)"
  m5: "beat-cut sync — exp(-||cut_time - nearest_beat||^2 / 2σ^2)"
  m6: "energy correspondence — Spearman corr between shot flow-magnitude and music RMS energy"
