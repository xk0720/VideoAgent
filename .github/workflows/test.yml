name: tests

on:
  # Temporarily disabled — tests are run on the server instead of CI.
  # To re-enable, uncomment the push / pull_request triggers below.
  workflow_dispatch:
  # push:
  #   branches: [main]
  # pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install ffmpeg (required by AssemblyTool)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install package (base mocks only)
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e .

      - name: Lint (pyflakes)
        run: |
          python -m pip install pyflakes
          PYTHONPATH=src python -m pyflakes src/ tests/ benchmark/ scripts/

      - name: Run pytest
        run: |
          python -m pip install pytest pytest-mock
          PYTHONPATH=src python -m pytest tests/ -q
