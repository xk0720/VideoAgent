project_name: "maestro"
cache_root: "./.cache"
output_root: "./outputs"

# ── Models (v0.1 all mock; set backend in v0.2) ──
models:
  llm:
    name: "mock-llm"          # v0.2: deepseek-v3 / claude / gpt / vllm-local
  mllm:
    name: "mock-mllm"         # v0.2: qwen-vl judge/critic
  video_gen:
    name: "mock-video-gen"    # v0.2: omniweaving / wan / veo-api
    # weights_path: "/data/ckpts/omniweaving"   # for local backends
    # device: "cuda"
  image_edit:
    name: "mock-image-edit"   # v0.2: qwen-image-edit
  # Optional world-model reward (WMReward arXiv:2601.10553 / VJEPA-2 Reward
  # 2510.21840): adds a `wm_reward` metric so best-of-N + Verifier becomes
  # test-time physics search. Unset = identical metrics to v0.2.2.
  # world_reward:
  #   name: "mock-world-reward"   # v0.3: "vjepa2"
  # C6 oracle track extractor — recovers OBSERVED motion from generated frames
  # for the sketch-vs-video physics check. Default mock (CPU, no deps); real
  # backends ('cotracker'/'tapir') need torch + real mp4 frames.
  track_extractor:
    name: "mock-track"           # v0.3: "cotracker" / "tapir"
    # checkpoint: "/data/ckpts/cotracker3.pth"   # or omit for torch.hub
    # device: "cuda"

# ── Planning ──
plan:
  n_shots: 3
  max_shots: 6
  shot_duration: 3.0
  max_plan_iters: 3          # plan-level Validate->Correct loop cap

# ── Generation + self-improve loop ──
compose:
  fps: 8
  n_candidates: 2             # tournament pool (E3)
  max_revisions: 5            # cap on self-improve rounds (C2)
  k_retries: 2               # per-revision retries before escape hatch

# ── Metric suite (C3). weighted_total drives Verifier's monotonic check ──
# NOTE: an explicit weights block here OVERRIDES the code defaults wholesale,
# so it must list every dimension you want to count — including p2 (C6).
metrics:
  weights:
    m1_semantic: 0.22
    m2_temporal: 0.13
    p1_physics: 0.22              # native physics-failure modes (C1 critic layer)
    p2_law_consistency: 0.10      # measured law-residual verification (C6 v0.4)
    id1_identity: 0.13
    m5_rhythm: 0.10
    aesthetic: 0.10

# ── Physics ──
physics:
  simulator: "mock"           # v0.2: mujoco / newton / particle-sim
  acceptance_severity: 0.30   # below this, a failure mode is considered resolved

# ── Multi-Layer Memory (C8, v0.3) ──
# Each tier is independently switchable. base_dir is set per run via the
# `memory_dir` arg to run_maestro (defaults to <output>/memory).
memory:
  user_id: "default"           # owner of preference tier
  enable_skills: true          # C7 SkillLibrary (procedural memory)
  enable_entities: true        # cross-run identity persistence
  enable_preferences: true     # per-user cinematic / strictness biases
  enable_episodes: true        # episodic trace store
  # Skill distillation thresholds (mirrored from SkillLibrary defaults so an
  # operator can tune without editing code).
  skill_distill_severity_threshold: 0.5    # initial worst verdict ≥ this
  skill_perf_ema_alpha: 0.3                # rolling-avg perf_score
  skill_eviction_floor: 0.4                # drop if perf < floor AND uses > 5
