# ── Models (default = mock, CPU-only; flip a name to wire a real backend) ──
models:
  # LLM (planning brain). Real backends in models/llm_backends.py (raw requests,
  # no SDK dep). Set name + model, supply the key via config.api_key or env:
  #   name: "deepseek"   model: "deepseek-chat"     $DEEPSEEK_API_KEY
  #   name: "openai"     model: "gpt-4o"            $OPENAI_API_KEY
  #   name: "qwen"       model: "qwen-plus"         $QWEN_API_KEY
  #   name: "anthropic"  model: "claude-sonnet-4-6" $ANTHROPIC_API_KEY
  #   name: "vllm"       model: "<served-id>"  base_url: http://host:8000/v1
  llm:
    name: "mock-llm"          # real: deepseek / openai / qwen / anthropic / vllm
  # MLLM/VLM judge & critic. Real backends in models/mllm_backends.py.
  #   name: "gpt-4o"   model: "gpt-4o"       $OPENAI_API_KEY
  #   name: "qwen-vl"  model: "qwen-vl-max"  $QWEN_API_KEY
  # A non-decodable clip (mock text placeholder) yields NO vlm verdicts — the
  # judge never fabricates a verdict without pixels (no-signal-from-no-evidence).
  mllm:
    name: "mock-mllm"         # real: gpt-4o / qwen-vl
  video_gen:
    name: "mock-video-gen"    # v0.2: omniweaving / wan / veo-api
    # weights_path: "/data/ckpts/omniweaving"   # for local backends
    # device: "cuda"
  image_edit:
    name: "mock-image-edit"   # v0.2: qwen-image-edit
  # Optional world-model reward (WMReward arXiv:2601.10553 / VJEPA-2 Reward
  # 2510.21840): adds a `wm_reward` metric so best-of-N + Verifier becomes
  # test-time physics search. Unset = identical metrics to v0.2.2.
  # world_reward:
  #   name: "mock-world-reward"   # v0.3: "vjepa2"
  # C6 track extractor — recovers OBSERVED motion from generated frames for
  # the reference-free law checks (physics/laws.py). Default mock (CPU, no
  # deps); real backends ('cotracker'/'tapir') need torch + real mp4 frames.
  track_extractor:
    name: "mock-track"           # real: "cotracker" / "tapir"
    # checkpoint: "/data/ckpts/cotracker3.pth"   # or omit for torch.hub
    # device: "cuda"

# ── Planning ──
plan:
  n_shots: 3
  max_shots: 6
  shot_duration: 3.0
  max_plan_iters: 3          # plan-level Validate->Correct loop cap

# ── Generation + self-improve loop ──
compose:
  fps: 8
  n_candidates: 2             # tournament pool (E3)
  max_revisions: 5            # cap on self-improve rounds (C2)
  k_retries: 2               # per-revision retries before escape hatch

# ── Metric suite (C3). weighted_total drives Verifier's monotonic check ──
# NOTE: an explicit weights block here OVERRIDES the code defaults wholesale,
# so it must list every dimension you want to count — including p2 (C6).
# NOTE: enabling models.world_reward adds a `wm_reward` metric dimension; it
# is ZERO-WEIGHTED unless you also add a `wm_reward` weight to this block.
metrics:
  weights:
    m1_semantic: 0.22
    m2_temporal: 0.13
    p1_physics: 0.22              # native physics-failure modes (C1 critic layer)
    p2_law_consistency: 0.10      # measured law-residual verification (C6 v0.4)
    id1_identity: 0.13
    m5_rhythm: 0.10
    aesthetic: 0.10

# ── Physics (C6 v0.4 — reference-free verification; no simulator) ──
# (The mock MLLM's "resolved below 0.3 severity" rule is an internal constant
# of models/mllm.py MockMLLMClient, not a config key.)
physics:
  violation_threshold: 0.40   # law-residual/anomaly severity that triggers a verdict
  # Post-acceptance hardening (log-only quality watchdog): after a candidate
  # is accepted at HSI tier ≥ 1, one extra review runs at this strictness and
  # borderline physics is LOGGED, never rejected. 1.0 = off. Tightening is
  # deliberately NOT applied to failing shots — a stricter bar on a failing
  # shot inverts the repair incentive (more verdicts → lower p2 → the
  # monotonic Verifier rejects the candidates that fix the defect).
  post_accept_strictness: 1.0

# ── Multi-Layer Memory (C8, v0.3) ──
# Each tier is independently switchable. base_dir is set per run via the
# `memory_dir` arg to run_maestro (defaults to <output>/memory).
memory:
  user_id: "default"           # owner of preference tier
  enable_skills: true          # C7 SkillLibrary (procedural memory)
  enable_entities: true        # cross-run identity persistence
  enable_preferences: true     # per-user cinematic / strictness biases
  enable_episodes: true        # episodic trace store
  # Skill lifecycle tuning — threaded into SkillLibrary via
  # MultiLayerMemory.open (pipeline/run.py). Omit a key to use the library
  # class defaults.
  skill_distill_severity_threshold: 0.5    # initial worst verdict ≥ this
  skill_perf_ema_alpha: 0.3                # rolling-avg perf_score
  skill_eviction_floor: 0.4                # drop if perf < floor AND uses > 5
